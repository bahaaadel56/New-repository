<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام نقطة البيع المتطور - سوبرماركت</title>
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary: #2ECC71;
            --secondary-dark: #27AE60;
            --accent: #3498DB;
            --dark: #2C3E50;
            --light: #ECF0F1;
            --gray: #95A5A6;
            --danger: #E74C3C;
            --warning: #F39C12;
            --success: #2ECC71;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            overflow-x: hidden;
            color: var(--dark);
        }

        /* ============== HEADER ============== */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 12px 16px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.25);
            height: 70px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header h1 { 
            font-size: 22px; 
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        
        .header-logo {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .header-actions { 
            display: flex; 
            gap: 16px; 
            align-items: center;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .menu-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .menu-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        /* ============== SIDEBAR ============== */
        .sidebar {
            position: fixed;
            top: 70px; right: -280px;
            width: 280px;
            height: calc(100vh - 70px);
            background: white;
            z-index: 999;
            transition: right 0.3s ease;
            box-shadow: -4px 0 20px rgba(0,0,0,0.12);
            overflow-y: auto;
            padding: 20px 0;
        }
        
        .sidebar.open { right: 0; }
        
        .sidebar-overlay {
            position: fixed; 
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 998;
            display: none;
            backdrop-filter: blur(2px);
        }
        
        .sidebar-overlay.show { display: block; }

        .nav-menu {
            display: flex;
            flex-direction: column;
        }
        
        .nav-section {
            border-bottom: none;
            padding: 8px 0;
        }
        
        .nav-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-right: 4px solid transparent;
            color: var(--dark);
            font-weight: 500;
        }
        
        .nav-item:hover { 
            background: #f0f0f0;
            padding-right: 18px;
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, rgba(255,107,53,0.1) 0%, transparent 100%);
            border-right-color: var(--primary);
            color: var(--primary);
            font-weight: 700;
        }
        
        .nav-item-icon { 
            font-size: 22px;
            min-width: 24px;
        }
        
        .nav-item-text { 
            font-size: 14px;
            flex: 1;
        }

        /* ============== MAIN CONTENT ============== */
        .main-content {
            margin-top: 70px;
            min-height: calc(100vh - 70px);
            padding: 24px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        }

        .breadcrumb {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--gray);
        }
        
        .breadcrumb-item { 
            cursor: pointer; 
            color: var(--primary);
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .breadcrumb-item:hover { 
            color: var(--primary-dark);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .page-title { 
            font-size: 28px; 
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -0.5px;
        }
        
        .page-actions { 
            display: flex; 
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ============== CARDS ============== */
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
            padding-bottom: 16px;
        }
        
        .card-title { 
            font-size: 18px; 
            font-weight: 700;
            color: var(--dark);
        }

        /* ============== STATS GRID ============== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        
        .stat-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border-top: 5px solid var(--primary);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-box::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .stat-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
        }
        
        .stat-box.green { border-top-color: var(--success); }
        .stat-box.blue { border-top-color: var(--accent); }
        .stat-box.orange { border-top-color: var(--warning); }
        .stat-box.red { border-top-color: var(--danger); }
        .stat-box.purple { border-top-color: #9B59B6; }
        
        .stat-label { 
            font-size: 12px;
            color: var(--gray);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        
        .stat-value { 
            font-size: 32px;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        
        .stat-change { 
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        .stat-change.negative { color: var(--danger); }

        /* ============== TABLES ============== */
        .table-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 18px 16px;
            text-align: right;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 16px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: var(--dark);
        }
        
        tr:hover { 
            background: #fafafa;
        }
        
        tr:last-child td {
            border-bottom: none;
        }

        /* ============== BUTTONS ============== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(255,107,53,0.2);
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,107,53,0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-success { 
            background: linear-gradient(135deg, var(--success) 0%, var(--secondary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(46,204,113,0.2);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46,204,113,0.3);
        }
        
        .btn-danger { 
            background: linear-gradient(135deg, var(--danger) 0%, #C0392B 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(231,76,60,0.2);
        }
        
        .btn-warning { 
            background: linear-gradient(135deg, var(--warning) 0%, #E67E22 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(243,156,18,0.2);
        }
        
        .btn-sm { 
            padding: 8px 14px; 
            font-size: 12px;
        }
        
        .btn-block { 
            width: 100%;
        }

        /* ============== FORMS ============== */
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255,107,53,0.1);
        }

        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 18px;
        }
        
        .form-row-3 { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 18px;
        }

        /* ============== BADGES ============== */
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        
        .badge-success { 
            background: linear-gradient(135deg, rgba(46,204,113,0.1) 0%, rgba(39,174,96,0.1) 100%);
            color: var(--secondary-dark);
        }
        
        .badge-danger { 
            background: linear-gradient(135deg, rgba(231,76,60,0.1) 0%, rgba(192,57,43,0.1) 100%);
            color: #C0392B;
        }
        
        .badge-warning { 
            background: linear-gradient(135deg, rgba(243,156,18,0.1) 0%, rgba(230,126,34,0.1) 100%);
            color: #E67E22;
        }

        /* ============== MODALS ============== */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(3px);
        }
        
        .modal.show { display: flex; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 28px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            font-size: 20px;
            font-weight: 900;
            color: var(--dark);
            margin-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
            padding-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray);
            transition: all 0.2s;
            padding: 0;
        }
        
        .modal-close:hover {
            color: var(--dark);
            transform: rotate(90deg);
        }

        /* ============== ALERTS ============== */
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 13px;
            border-left: 4px solid;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .alert-success { 
            background: #E8F8F5;
            color: var(--secondary-dark);
            border-left-color: var(--success);
        }
        
        .alert-danger { 
            background: #FADBD8;
            color: #C0392B;
            border-left-color: var(--danger);
        }
        
        .alert-warning { 
            background: #FEF5E7;
            color: #E67E22;
            border-left-color: var(--warning);
        }
        
        .alert-info { 
            background: #EBF5FB;
            color: var(--accent);
            border-left-color: var(--accent);
        }

        /* ============== TABS ============== */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 3px solid #f0f0f0;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 14px 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--gray);
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab:hover {
            color: var(--primary);
        }
        
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* ============== RESPONSIVE ============== */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-row-3 {
                grid-template-columns: 1fr;
            }
            
            .page-title {
                font-size: 22px;
            }
            
            .stat-value {
                font-size: 24px;
            }
        }

        @media print {
            .header, .sidebar, .page-actions, .btn { display: none; }
            .main-content { margin-top: 0; }
            body { background: white; }
        }

        /* ============== SCROLL ============== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <!-- ============== HEADER ============== -->
    <div class="header">
        <div class="header-left">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="header-logo">🛒</div>
            <h1>سوبرماركت بوس</h1>
        </div>
        <div class="header-actions">
            <div class="user-info">
                <span>👤</span>
                <span id="userDisplay">المسؤول</span>
            </div>
        </div>
    </div>

    <!-- ============== SIDEBAR ============== -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="nav-menu" id="navMenu"></div>
    </div>

    <!-- ============== MAIN CONTENT ============== -->
    <div class="main-content">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div id="pageContent"></div>
    </div>

    <!-- ============== MODAL ============== -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
